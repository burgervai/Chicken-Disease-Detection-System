services:
  - type: web
    name: chicken-disease-api
    runtime: python
    plan: free
    buildCommand: "cd chicken-disease-api && pip install -r requirements.txt"
    startCommand: "cd chicken-disease-api && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: chicken_disease
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
