services:
  # Backend API
  - type: web
    name: chicken-disease-api
    runtime: python
    plan: starter
    buildCommand: "cd chicken-disease-api && pip install -r requirements.txt"
    startCommand: "cd chicken-disease-api && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: chicken_disease
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-vercel-domain.vercel.app
    healthCheckPath: /health

databases:
  - name: chicken-disease-mongodb
    databaseName: chicken_disease
    user: admin
